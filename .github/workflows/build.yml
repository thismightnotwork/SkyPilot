name: Build
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get install -y cmake ninja-build qt6-base-dev
      - name: Configure
        run: cmake -B build -G Ninja
      - name: Build
        run: cmake --build build
